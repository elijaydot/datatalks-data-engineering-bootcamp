global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'redpanda'
    static_configs:
      - targets: ['redpanda:9644']

  - job_name: 'flink'
    static_configs:
      - targets: ['flink-jobmanager:9249']

  - job_name: 'producer'
    static_configs:
      - targets: ['producer:8000']

  - job_name: 'flink-job'
    static_configs:
      - targets: ['flink-job:8001']
